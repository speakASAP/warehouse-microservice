apiVersion: batch/v1
kind: CronJob
metadata:
  name: warehouse-reservation-expiry
  namespace: statex-apps
  labels:
    app: warehouse-microservice
    job: reservation-expiry
    managed-by: k8s-migration
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        metadata:
          labels:
            app: warehouse-microservice
            job: reservation-expiry
        spec:
          restartPolicy: Never
          containers:
            - name: expire-due-reservations
              image: localhost:5000/warehouse-microservice:latest
              imagePullPolicy: Always
              envFrom:
                - configMapRef:
                    name: warehouse-microservice-config
                - secretRef:
                    name: warehouse-microservice-secret
              env:
                - name: WAREHOUSE_BASE_URL
                  value: "http://warehouse-microservice:3201"
                - name: RESERVATION_EXPIRY_LIMIT
                  value: "100"
              command:
                - node
                - -e
              args:
                - |
                  const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
                  // Retries transport errors (ECONNREFUSED while the target has no ready
                  // endpoint) and 5xx only. Business failures are never retried here.
                  // Backoff ladder matches domain-research-notification-dispatch, which rides
                  // out these blips reliably while the un-retried jobs fail.
                  const RETRY_DELAYS_MS = [0, 5000, 10000, 20000, 30000, 45000];
                  async function fetchWithRetry(url, options) {
                    let lastError;
                    for (let i = 0; i < RETRY_DELAYS_MS.length; i += 1) {
                      const isLast = i === RETRY_DELAYS_MS.length - 1;
                      if (RETRY_DELAYS_MS[i] > 0) await sleep(RETRY_DELAYS_MS[i]);
                      try {
                        const response = await fetch(url, options);
                        if (response.status >= 500 && !isLast) {
                          lastError = new Error(`upstream returned ${response.status}`);
                        } else {
                          return response;
                        }
                      } catch (error) {
                        lastError = error;
                        if (isLast) break;
                      }
                      console.error(`attempt ${i + 1}/${RETRY_DELAYS_MS.length} failed: ${lastError.message}; retrying`);
                    }
                    throw lastError;
                  }
                  (async () => {
                    const baseUrl = process.env.WAREHOUSE_BASE_URL || 'http://warehouse-microservice:3201';
                    const limit = Number.parseInt(process.env.RESERVATION_EXPIRY_LIMIT || '100', 10);
                    const token = process.env.CLIPLOT_WAREHOUSE_SERVICE_TOKEN;
                    if (!token) {
                      throw new Error('CLIPLOT_WAREHOUSE_SERVICE_TOKEN is required for reservation expiry CronJob');
                    }
                    const response = await fetchWithRetry(`${baseUrl}/api/reservations/expire-due`, {
                      method: 'POST',
                      headers: {
                        authorization: `Bearer ${token}`,
                        'content-type': 'application/json',
                      },
                      body: JSON.stringify({ limit }),
                    });
                    const text = await response.text();
                    let payload;
                    try {
                      payload = JSON.parse(text);
                    } catch (error) {
                      throw new Error(`Unexpected expiry response: status=${response.status} body=${text}`);
                    }
                    console.log(JSON.stringify({
                      status: response.status,
                      success: payload.success,
                      data: payload.data,
                    }));
                    if (!response.ok || !payload.success || payload.data?.failed > 0) {
                      throw new Error(`Reservation expiry failed: status=${response.status} failed=${payload.data?.failed ?? 'unknown'}`);
                    }
                  })().catch((error) => {
                    console.error(error);
                    process.exit(1);
                  });
