apiVersion: apps/v1
kind: Deployment
metadata:
  name: warehouse-microservice
  namespace: statex-apps
  labels:
    app: warehouse-microservice
    managed-by: k8s-migration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: warehouse-microservice
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: warehouse-microservice
    spec:
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z db-server-postgres 5432; do echo waiting for postgres; sleep 2; done']
        - name: wait-auth
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z auth-microservice 3370; do echo waiting for auth; sleep 2; done']
        - name: wait-logging
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z logging-microservice 3367; do echo waiting for logging; sleep 2; done']
        - name: wait-rabbitmq
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z rabbitmq 5672; do echo waiting for rabbitmq; sleep 2; done']
      containers:
        - name: app
          image: localhost:5000/warehouse-microservice:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3201
              name: http
          envFrom:
            - configMapRef:
                name: warehouse-microservice-config
            - secretRef:
                name: warehouse-microservice-secret
          startupProbe:
            httpGet:
              path: /api/health
              port: 3201
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3201
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/ready
              port: 3201
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
